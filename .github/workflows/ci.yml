name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v1.62.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: lint
        run: ./scripts/lint.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: test
        run: ./scripts/test.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: cross-compile
        run: ./scripts/cross.sh
      - name: smoke test linux-amd64
        run: ./dist/ferry-linux-amd64 --help
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ferry-binaries
          path: dist/
          retention-days: 7
