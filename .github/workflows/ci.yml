name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          args: --version
      - name: lint
        run: ./scripts/lint.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: test
        run: ./scripts/test.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: cross-compile
        run: ./scripts/cross.sh
      - name: smoke test linux-amd64
        run: ./dist/ferry-linux-amd64 --help
      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ferry-binaries
          path: dist/
          retention-days: 7
